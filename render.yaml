services:
  - type: web
    name: layer3trading-site
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAD_NOTIFICATION_EMAIL
        value: jonathan@layer3labs.io
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: layer3trading-leads
          property: connectionString

databases:
  - name: layer3trading-leads
    databaseName: layer3trading_leads
    user: layer3trading_user
    plan: free
